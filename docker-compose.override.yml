services:
  # vLLM 0.9 RC with Speculative Decoding
  vllm:
    image: vllm/vllm:0.9.0rc1
    command: >
      python -m vllm.entrypoints.openai.api_server
      --model /models/tinyllama_1b_chat_q4
      --speculative-mode draft
      --draft-model /models/tinyllama_1b_chat_exllama2
      --acceptance-rate 0.75
      --gpu-memory-utilization 0.85
      --max-num-seqs 16
      --max-model-len 2048
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      CUDA_VISIBLE_DEVICES: 0
    ports:
      - "8001:8000"
    volumes:
      - ./models:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Override council-api with Week 3 integrations
  council-api:
    environment:
      - SWARM_EXEC_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
      - VLLM_URL=http://vllm:8000
      - MAX_INFLIGHT_PROMPTS=16
      - VLLM_SPEC=true
      - BUDGET_MAX_DAILY=0.50
    depends_on:
      - redis
      - vllm

  mixtral:
    image: mixtral:latest
    environment:
      CUDA_VISIBLE_DEVICES: "${GPU_AUX_ID:-1}"
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              driver: nvidia
              count: 1
              device_ids: ["${GPU_AUX_ID:-1}"]

  # Original services maintained
  api:
    environment:
      - GPU_MAIN_ID=${GPU_MAIN_ID:-0}
      - GPU_AUX_ID=${GPU_AUX_ID:-1}
  
  pattern-miner:
    environment:
      - GPU_PROFILE_CONFIG=/app/config/profiles.yaml 

  # Drift Exporter for Semantic Monitoring
  drift-exporter:
    build: ./drift_exporter
    volumes:
      - ./snapshots:/snapshots:ro
    ports:
      - "9105:9105"
    restart: unless-stopped