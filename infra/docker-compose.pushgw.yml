version: '3.8'

# Pushgateway overlay for alert testing and batch job metrics
# Used by: make test-alerts-e2e

services:
  pushgw:
    image: prom/pushgateway:v1.6.0
    container_name: spiral-pushgateway-test
    restart: "no"  # Only for testing
    ports:
      - "9091:9091"
    networks:
      - swarm-spiral-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9091/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - "prometheus.io/scrape=true"
      - "prometheus.io/port=9091" 
      - "prometheus.io/path=/metrics"
      - "traefik.enable=false"  # Don't route through Traefik

networks:
  swarm-spiral-network:
    external: true 