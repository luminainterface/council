name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  tests-linux:
    runs-on: ubuntu-22.04
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r tests/requirements.txt
      
      - name: Run unit tests
        run: pytest tests/test_unit_fast.py -v
      
      - name: Run integration tests
        run: pytest tests/test_integration_smoke.py -v

  # 🚀 NEW: Windows CI Runner for Week 2 Final Push
  tests-win:
    runs-on: windows-2022
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Enable WSL + Docker
        run: |
          # Install Docker Desktop
          choco install docker-desktop --pre --yes
          
          # Install WSL with Ubuntu
          wsl --install -d Ubuntu --no-launch
          
          # Wait for WSL to be ready
          Start-Sleep 30
          
          # Install Redis in WSL
          wsl -d Ubuntu -- bash -c "sudo apt update && sudo apt install -y redis-server"
          
          # Start Redis in background
          wsl -d Ubuntu -- bash -c "redis-server --daemonize yes"
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r tests/requirements.txt
      
      - name: Start services
        run: |
          # Start Redis via WSL
          wsl -d Ubuntu -- redis-server --daemonize yes
          
          # Wait for Redis to be ready
          Start-Sleep 5
          
          # Verify Redis is running
          python -c "import redis; r = redis.Redis(); r.ping(); print('Redis OK')"
      
      - name: Run Windows-specific tests
        run: |
          # Run tests that don't require GPU
          pytest -m "not gpu" tests/test_unit_fast.py -v
          pytest -m "not gpu" tests/test_integration_smoke.py -v
          
          # Run OS executor tests (golden path)
          pytest tests/os_exec_smoke.py -v
        env:
          SWARM_EXEC_ENABLED: true
          REDIS_URL: redis://localhost:6379/0
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-test-results
          path: |
            test-results/
            logs/
            *.log 